seed: 42
device: cpu

dataset:
  source: npz
  name: cora
  path: data/cora/cora.npz

preprocess:
  normalize_features: true
  normalize_adjacency: true
  add_self_loops: true
  adj_normalize_method: l1
  use_cache: true

model:
  name: daegc
  hidden_dim: 256
  embed_dim: 16
  num_clusters: 7
  dropout: 0.3
  alpha: 1.0
  v: 1.0

optimizer:
  pretrain_lr: 0.005
  finetune_lr: 0.0001
  weight_decay: 0.0

trainer:
  pretrain_epochs: 30
  finetune_epochs: 100
  eval_every: 10
  w_kl: 10.0

output:
  dir: outputs/daegc_cora_ablation_old
  cache_dir: outputs/cache
