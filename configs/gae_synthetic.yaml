seed: 42
device: cpu

dataset:
  source: synthetic
  name: synthetic
  num_nodes: 600
  num_features: 64
  num_clusters: 6

preprocess:
  normalize_features: true
  normalize_adjacency: true
  add_self_loops: true
  use_cache: true

model:
  name: gae_kmeans_baseline
  hidden_dim: 128
  embed_dim: 32
  num_clusters: 6
  dropout: 0.1

optimizer:
  lr: 0.001
  weight_decay: 0.0001

trainer:
  epochs: 80
  eval_every: 10

loss:
  w_rec_x: 1.0
  w_rec_adj: 1.0
  w_cluster: 0.2

output:
  dir: outputs/gae_synthetic_quickstart
  cache_dir: outputs/cache
